<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cercle Vicieux</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0910;--panel:rgba(10,9,22,0.85);--border:rgba(180,160,255,0.18);
  --accent:#b89fff;--accent2:#7c5ccc;--text:#ede9ff;--name:#d4c5ff;--muted:#6e6590;--r:14px;
  --narrator:#8c8aa8;
}
body{background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);height:100dvh;overflow:hidden;user-select:none;}
.hidden{display:none!important}

/* ── TITRE ── */
#title-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:#0a0910;overflow:hidden;}
#title-screen::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1px 1px at 20% 15%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 55% 40%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 80% 20%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 35% 70%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 65% 80%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 10% 55%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 90% 60%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 45% 25%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 75% 50%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 25% 85%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 5% 30%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 92% 38%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 48% 92%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 60% 10%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 15% 45%,rgba(255,255,255,.7) 0%,transparent 100%);pointer-events:none;}
#title-screen::after{content:'';position:absolute;width:600px;height:400px;top:50%;left:50%;transform:translate(-50%,-60%);background:radial-gradient(ellipse,rgba(120,80,220,0.22) 0%,transparent 70%);pointer-events:none;}
.title-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:1.2rem;animation:fadeUp .9s ease both;}
.title-deco{display:flex;align-items:center;gap:12px;margin-bottom:.4rem;}
.title-deco span{display:block;height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--accent2));}
.title-deco span:last-child{background:linear-gradient(90deg,var(--accent2),transparent);}
.title-deco i{font-size:16px;color:var(--accent2);letter-spacing:.2em;}
#game-title{font-family:Georgia,serif;font-size:clamp(2.4rem,6vw,4.2rem);font-weight:normal;letter-spacing:.1em;color:var(--name);text-shadow:0 0 60px rgba(160,120,255,.4);line-height:1.1;}
#game-subtitle{font-size:.95rem;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;}
.title-sep{width:1px;height:40px;background:linear-gradient(to bottom,transparent,var(--border),transparent);margin:.2rem 0;}
#btn-start{margin-top:.5rem;padding:.7rem 2.6rem;font-size:.9rem;font-family:inherit;letter-spacing:.14em;text-transform:uppercase;background:transparent;color:var(--accent);border:1px solid var(--accent2);border-radius:40px;cursor:pointer;transition:background .25s,color .25s,border-color .25s,box-shadow .25s;position:relative;overflow:hidden;}
#btn-start::before{content:'';position:absolute;inset:0;background:var(--accent2);opacity:0;transition:opacity .25s;border-radius:40px;}
#btn-start:hover{color:#fff;border-color:var(--accent);box-shadow:0 0 28px rgba(140,100,255,.35);}
#btn-start:hover::before{opacity:1}
#btn-start span{position:relative;z-index:1}

/* ── SCÈNE ── */
#game-screen{position:fixed;inset:0;display:flex;align-items:flex-end;justify-content:center;}
#background{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .55s ease;}
#background::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(8,6,20,.75) 0%,rgba(8,6,20,.15) 50%,transparent 100%);}
#character-container{position:absolute;bottom:155px;left:50%;transform:translateX(-50%);pointer-events:none;max-height:70vh;display:flex;align-items:flex-end;transition:opacity .4s;}
#character-img{max-height:70vh;max-width:38vw;object-fit:contain;filter:drop-shadow(0 6px 28px rgba(0,0,0,.75));}
#character-img.fi{animation:charIn .4s ease both}
#character-img.fo{animation:charOut .3s ease both}

/* ── BOÎTE DIALOGUE ── */
#dialogue-box{position:relative;z-index:10;width:min(800px,94vw);margin-bottom:24px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 2px 40px rgba(0,0,0,.55),inset 0 1px 0 rgba(180,160,255,.08);cursor:pointer;overflow:hidden;transition:border-color .4s,box-shadow .4s;}
#dialogue-box::before{content:'';display:block;height:2px;background:linear-gradient(90deg,transparent 0%,var(--accent2) 30%,var(--accent) 60%,transparent 100%);opacity:.6;transition:background .4s;}
#dialogue-header{padding:.55rem 1.1rem .1rem}
#character-name{display:inline-block;font-family:Georgia,serif;font-size:.95rem;font-weight:normal;color:var(--name);letter-spacing:.08em;padding:.15rem 0;border-bottom:1.5px solid var(--accent2);min-width:50px;min-height:1.3em;opacity:.92;transition:color .3s,border-color .3s;}
#dialogue-text-wrapper{padding:.65rem 1.1rem .9rem;position:relative;}
#dialogue-text{font-size:clamp(.95rem,2vw,1.05rem);line-height:1.8;color:var(--text);min-height:3em;white-space:pre-line;}
#next-arrow{position:absolute;bottom:.55rem;right:1rem;color:var(--accent);font-size:.8rem;animation:bounce 1.1s infinite;opacity:.7;}
#choices-container{display:flex;flex-direction:column;gap:.45rem;padding:.3rem 1.1rem .9rem;}
.choice-btn{padding:.6rem .9rem;background:rgba(140,100,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.93rem;cursor:pointer;text-align:left;transition:background .2s,border-color .2s;}
.choice-btn:hover{background:rgba(140,100,255,.18);border-color:var(--accent2)}

/* ── STYLE NARRATEUR EXTÉRIEUR ── */
#dialogue-box.narrator-mode{border-color:rgba(140,138,168,.35);box-shadow:0 2px 40px rgba(0,0,0,.55),inset 0 1px 0 rgba(140,138,168,.12);}
#dialogue-box.narrator-mode::before{background:linear-gradient(90deg,transparent 0%,var(--narrator) 30%,#b8b6d0 60%,transparent 100%);}
#dialogue-box.narrator-mode #character-name{color:var(--narrator);border-bottom-color:var(--narrator);font-style:italic;letter-spacing:.14em;}
#dialogue-box.narrator-mode #dialogue-text{color:#c4c2da;font-style:italic;font-size:clamp(.88rem,1.8vw,.98rem);}

/* ── TOOLBAR ── */
#toolbar{position:fixed;top:14px;right:14px;display:flex;gap:7px;z-index:20;}
.tool-btn{padding:.35rem .85rem;font-size:.75rem;font-family:inherit;background:var(--panel);color:var(--muted);border:1px solid var(--border);border-radius:20px;cursor:pointer;backdrop-filter:blur(12px);transition:color .2s,border-color .2s;}
.tool-btn:hover,.tool-btn.active{color:var(--accent);border-color:var(--accent2)}

/* ── ÉDITEUR RAPIDE ── */
#editor-panel{position:fixed;inset:0;z-index:60;background:rgba(5,4,12,.94);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:1rem;}
.editor-card{width:min(760px,100%);max-height:90vh;overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:0 20px 70px rgba(0,0,0,.45);}
.editor-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.1rem;border-bottom:1px solid var(--border);}
.editor-header h2{font-family:Georgia,serif;font-size:1rem;color:var(--name);}
.editor-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;}
.editor-close:hover{color:var(--text);}
.editor-body{display:grid;gap:.8rem;padding:1rem 1.1rem 1.2rem;}
.editor-row{display:grid;gap:.25rem;}
.editor-row label{font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.editor-row input,.editor-row textarea,.editor-row select{width:100%;padding:.7rem .8rem;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.04);color:var(--text);font:inherit;resize:vertical;}
.editor-row textarea{min-height:110px;}
.editor-actions{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.2rem;}
.editor-btn{padding:.6rem .95rem;border:1px solid var(--accent2);border-radius:999px;background:transparent;color:var(--accent);cursor:pointer;font:inherit;}
.editor-btn:hover{background:rgba(140,100,255,.16);}
.editor-hint{font-size:.82rem;color:var(--muted);line-height:1.6;}
.editor-choice-list{display:grid;gap:.5rem;}
.editor-choice-item{display:grid;grid-template-columns:1.3fr .7fr;gap:.5rem;}
.editor-choice-item input{min-width:0;}
.editor-manager{display:grid;grid-template-columns:1.05fr .95fr;gap:1rem;}
.editor-column{display:grid;gap:.75rem;}
.editor-list,.editor-tree{max-height:260px;overflow:auto;padding-right:.2rem;display:grid;gap:.5rem;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.03);padding:.65rem;}
.editor-scene-item{display:flex;flex-direction:column;gap:.2rem;text-align:left;padding:.65rem .7rem;border:1px solid transparent;border-radius:10px;background:rgba(255,255,255,.03);color:var(--text);cursor:pointer;}
.editor-scene-item strong{font-size:.86rem;color:var(--name);} 
.editor-scene-item span{font-size:.78rem;color:var(--muted);} 
.editor-scene-item:hover,.editor-scene-item.selected{border-color:var(--accent2);background:rgba(140,100,255,.13);} 
.editor-empty,.tree-empty{font-size:.82rem;color:var(--muted);padding:.4rem 0;}
.tree-list{display:grid;gap:.5rem;}
.tree-node{display:flex;flex-direction:column;gap:.2rem;padding:.6rem .7rem;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.03);} 
.tree-node strong{font-size:.8rem;color:var(--name);} 
.tree-node span{font-size:.75rem;color:var(--muted);} 
.tree-branches{display:grid;gap:.35rem;margin-left:.7rem;padding-left:.7rem;border-left:1px dashed var(--border);} 
.tree-branch{font-size:.76rem;color:var(--muted);padding:.2rem 0;}
@media (max-width: 860px){.editor-manager{grid-template-columns:1fr;}}
@media (max-width: 640px){.editor-choice-item{grid-template-columns:1fr;}}

/* ── LOG ── */
#log-panel{position:fixed;inset:0;z-index:50;background:rgba(8,6,20,.96);backdrop-filter:blur(22px);display:flex;flex-direction:column;animation:fadeUp .2s ease both;}
#log-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.4rem;border-bottom:1px solid var(--border);font-family:Georgia,serif;font-size:1rem;color:var(--name);}
#btn-close-log{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;transition:color .2s;}
#btn-close-log:hover{color:var(--text)}
#log-entries{overflow-y:auto;padding:1rem 1.4rem 2rem;display:flex;flex-direction:column;gap:1.1rem;}
.log-entry{display:flex;flex-direction:column;gap:.25rem}
.log-entry.is-narrator .log-name{color:var(--narrator);font-style:italic;}
.log-entry.is-narrator .log-line{font-style:italic;color:#8a87a0;}
.log-name{font-size:.82rem;color:var(--name);font-weight:600}
.log-line{font-size:.93rem;color:var(--muted);line-height:1.65}

/* ── ÉCRAN DE FIN SIMPLE ── */
#end-screen{
  position:fixed;inset:0;z-index:100;
  background:rgba(6,5,14,.97);backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.2rem;
  text-align:center;
  animation:fadeUp .35s ease both;
}
#end-title{
  font-family:Georgia,serif;font-size:clamp(1.4rem,4vw,2.2rem);
  color:var(--name);letter-spacing:.08em;margin-bottom:1rem;
}
#end-desc{
  font-size:.95rem;color:var(--muted);line-height:1.8;
  max-width:520px;margin-bottom:2rem;
}
#btn-end-restart{
  padding:.7rem 2.4rem;font-size:.85rem;font-family:inherit;
  letter-spacing:.14em;text-transform:uppercase;
  background:transparent;color:var(--accent);
  border:1px solid var(--accent2);border-radius:40px;cursor:pointer;
  transition:background .25s,color .25s,box-shadow .25s;
}
#btn-end-restart:hover{color:#fff;box-shadow:0 0 28px rgba(140,100,255,.35);background:var(--accent2);}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
@keyframes charIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}
@keyframes charOut{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>

<!-- TITRE -->
<div id="title-screen">
  <div class="title-inner">
    <div class="title-deco"><span></span><i>✦</i><span></span></div>
    <h1 id="game-title">Cercle Vicieux</h1>
    <p id="game-subtitle">Une histoire d'amour qui ne devrait pas en être une</p>
    <div class="title-sep"></div>
    <button id="btn-start"><span>▶ Commencer</span></button>
  </div>
</div>

<!-- SCÈNE -->
<div id="game-screen" class="hidden">
  <div id="background"></div>
  <div id="character-container"><img id="character-img" src="" alt="Personnage"/></div>
  <div id="dialogue-box">
    <div id="dialogue-header"><span id="character-name"></span></div>
    <div id="dialogue-text-wrapper">
      <p id="dialogue-text"></p>
      <span id="next-arrow">▼</span>
    </div>
    <div id="choices-container" class="hidden"></div>
  </div>
  <div id="toolbar">
    <button class="tool-btn" id="btn-auto">⏵ Auto</button>
    <button class="tool-btn" id="btn-skip">⏭ Passer</button>
    <button class="tool-btn" id="btn-log">📜 Log</button>
    <button class="tool-btn" id="btn-editor">✎ Éditeur</button>
    <button class="tool-btn" id="btn-save">💾 Save</button>
    <button class="tool-btn" id="btn-load">📂 Load</button>
  </div>
  <div id="log-panel" class="hidden">
    <div id="log-header"><span>Journal</span><button id="btn-close-log">✕</button></div>
    <div id="log-entries"></div>
  </div>
</div>

<div id="editor-panel" class="hidden">
  <div class="editor-card">
    <div class="editor-header">
      <h2>Éditeur rapide</h2>
      <button id="btn-close-editor" class="editor-close" type="button">✕</button>
    </div>
    <div class="editor-body">
      <div class="editor-manager">
        <div class="editor-column">
          <div class="editor-row">
            <label>Scènes du scénario</label>
            <div id="editor-scene-list" class="editor-list"></div>
          </div>
        </div>
        <div class="editor-column">
          <div class="editor-row">
            <label>Arbre du scénario</label>
            <div id="editor-tree-view" class="editor-tree"></div>
          </div>
        </div>
      </div>
      <div class="editor-row">
        <label for="editor-type">Type de scène</label>
        <select id="editor-type">
          <option value="dialogue">Dialogue</option>
          <option value="choice">Choix</option>
          <option value="end">Fin</option>
        </select>
      </div>
      <div class="editor-row">
        <label for="editor-id">ID de la scène</label>
        <input id="editor-id" placeholder="ex : suite_01" />
      </div>
      <div id="editor-character-row" class="editor-row">
        <label for="editor-character">Personnage</label>
        <input id="editor-character" placeholder="Lou, Narrateur..." />
      </div>
      <div id="editor-image-row" class="editor-row">
        <label for="editor-image">Image (URL)</label>
        <input id="editor-image" placeholder="https://..." />
      </div>
      <div id="editor-background-row" class="editor-row">
        <label for="editor-background">Fond (URL)</label>
        <input id="editor-background" placeholder="https://..." />
      </div>
      <div id="editor-text-block" class="editor-row">
        <label for="editor-text">Texte</label>
        <textarea id="editor-text" placeholder="Écris ici le dialogue ou la narration..."></textarea>
      </div>
      <div id="editor-end-block" class="editor-row hidden">
        <label for="editor-title">Titre de la fin</label>
        <input id="editor-title" placeholder="Titre de la fin..." />
      </div>
      <div id="editor-end-desc-block" class="editor-row hidden">
        <label for="editor-desc">Description de la fin</label>
        <textarea id="editor-desc" placeholder="Explique ce que montre la fin..."></textarea>
      </div>
      <div id="editor-choice-block" class="editor-row hidden">
        <label for="editor-choices">Choix (1 par ligne : "Label | nextId")</label>
        <textarea id="editor-choices" placeholder="Ex : Je reste | suite_rest&#10;Je pars | suite_part"></textarea>
      </div>
      <div class="editor-actions">
        <button id="btn-save-scene" class="editor-btn" type="button">Enregistrer la scène</button>
        <button id="btn-new-scene" class="editor-btn" type="button">Nouvelle scène</button>
        <button id="btn-add-scene" class="editor-btn" type="button">Ajouter après la scène courante</button>
        <button id="btn-add-scene-end" class="editor-btn" type="button">Ajouter à la fin</button>
        <button id="btn-delete-scene" class="editor-btn" type="button">Supprimer la scène</button>
      </div>
      <p id="editor-status" class="editor-hint">Les scènes modifiées sont enregistrées sur le serveur du projet.</p>
    </div>
  </div>
</div>

<!-- ÉCRAN DE FIN -->
<div id="end-screen" class="hidden">
  <h1 id="end-title"></h1>
  <p id="end-desc"></p>
  <button id="btn-end-restart"><span>Recommencer</span></button>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  SCÉNARIO — « Cercle Vicieux »
//
//  Plus de jauge d'affinité : la suite de l'histoire est
//  déterminée UNIQUEMENT par les choix narratifs (chaque choix
//  pointe directement vers la scène suivante via "next").
//
//  Deux types de choix, librement mélangeables :
//
//  1) CHOIX "RÉACTION" (sans impact structurel)
//     → toutes les options pointent vers la MÊME scène suivante,
//       mais chacune peut déclencher une petite réaction
//       différente avant de converger. Utile pour donner de
//       l'agentivité sans complexifier l'arborescence.
//
//     Exemple :
//     { id:"X", type:"choice", choices:[
//         { label:"Option A", next:"reaction_a" },
//         { label:"Option B", next:"reaction_b" },
//       ] }
//     → "reaction_a" et "reaction_b" sont de courtes scènes
//       distinctes qui ENCHAÎNENT ensuite vers la même scène
//       commune (ex: les deux ont next:"suite_commune").
//
//  2) CHOIX "BRANCHE" (structurel)
//     → chaque option mène à une scène ou un fil narratif
//       réellement différent, qui peut lui-même continuer
//       différemment ou converger plus tard.
//
//     Exemple :
//     { id:"Y", type:"choice", choices:[
//         { label:"Option A", next:"branche_a_1" },
//         { label:"Option B", next:"branche_b_1" },
//       ] }
//
//  ── DIALOGUE ──
//  { id, type:"dialogue", character, image, background, text }
//  → character:"Narrateur-ext" active le style "narrateur
//    extérieur" (italique, gris, en retrait du récit).
//
//  ── FIN ──
//  { id, type:"end", title, desc }
//  → affiche l'écran de fin avec titre + description, puis
//    propose de recommencer.
// ════════════════════════════════════════════════════════════

const defaultStory = [

  // ── PROLOGUE ──────────────────────────────────────────────
  {
    id:"1", type:"dialogue",
    character:"", image:"",
    background:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1280&q=80",
    text:"Une nuit chaude de juin, là où amour ce mele avec désir."
  },
  {
    id:"2", type:"dialogue",
    character:"", image:"", background:"",
    text:"Tu te retrouve dans ton lit douillet accompagné de ta chere et tendre chérie, qui a son habitude, est tres proche de toi."
  },
  {
    id: "3", type: "dialogue", character: "", image: "",
    background:"",
    text: "Tu te demande comment un gars comme toi a reussi a sortir avec une fille aussi incroyable. Elle a tout pour plaire : "
  },
  {
    id:"4", type:"dialogue", character:"", image:"", background:"", text:"Elle est inteligente, elle t'aide pour tes devoirs, elle est...jolie."
  },
  {
    id:"5", type:"dialogue", character:"", image:"", background:"", text:"Bref, compare a toi, elle as un avenir tout tracée, tandis que tu risque de finir au McDonald du coin, elle va faire des etudes d'avocats."
  },
  {
    id:"6", type:"dialogue", character:"", image:"", background:"", text: "Au moins tu devrais vivre une belle vie, avec autant d'argent que tu veux, une belle maison, des voyages, bref, tout ce dont tu as toujours rever. Et elle sait que tu l'aime, elle sait que tu serais pret a faire n'importe quoi pour elle, des fois elle en abuse, mais tu ferais n'importe quoi pour de l'argent."
  },
  {
    id:"7", type:"dialogue", character:"", image:"", background:"", text:"Tu te dis que tu serait pret a faire tout les sacrifices du monde pour rester avec elle, car malgré tout l'argent qu'elle pourrait t'apporter, tu l'aimes."
  },
  {
    id:"8", type:"dialogue", character:"", image:"", background:"", text:"Et c'est la seul chose qui compte."
  },

  // ── SCÈNE 1 — Retrouvailles ──────────────────────────────
  {
    id:"lou_arrive", type:"dialogue",
    character:"Lou",

const storyStorageKey = 'vn_story';

async function loadStoryData(){
  try{
    const raw = localStorage.getItem(storyStorageKey);
    if(raw){
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed) && parsed.length) return parsed;
    }
  } catch {}

  try{
    const response = await fetch('/api/story');
    if(response.ok){
      const fromServer = await response.json();
      if(Array.isArray(fromServer) && fromServer.length){
        localStorage.setItem(storyStorageKey, JSON.stringify(fromServer));
        return fromServer;
      }
    }
  } catch {}

  return defaultStory;
}

async function saveStoryData(){
  try{ localStorage.setItem(storyStorageKey, JSON.stringify(story)); } catch {}
  try{
    await fetch('/api/story', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(story)
    });
  } catch {}
}

// Index id → position dans story[]
const idMap = {};
function rebuildIdMap(){
  Object.keys(idMap).forEach(k => delete idMap[k]);
  story.forEach((s,i) => { if(s.id) idMap[s.id]=i; });
}

async function initStory(){
  story = await loadStoryData();
  rebuildIdMap();
  if(!el('game-screen').classList.contains('hidden')) go(0);
}

// ── Navigation ──
function go(indexOrId){
  const idx = typeof indexOrId==='string' ? idMap[indexOrId] : indexOrId;
  if(idx===undefined||idx>=story.length) return;
  state.index=idx;
  const s=story[idx];
  if(s.type==='dialogue') showDialogue(s);
  if(s.type==='choice')   showChoices(s);
  if(s.type==='end')      showEnd(s);
}

function showDialogue(s){
  dChoice.classList.add('hidden');
  dArrow.style.display='';
  if(s.background) bg.style.backgroundImage=`url('${s.background}')`;
  if(s.image){ charImg.src=s.image; charCon.style.display=''; charImg.className='fi'; }
  else { charCon.style.display='none'; }

  const isNarrator = s.character === 'Narrateur-ext';
  dBox.classList.toggle('narrator-mode', isNarrator);
  dName.textContent = isNarrator ? 'Voix extérieure' : (s.character||'');

  typeText(s.text,()=>{ if(state.autoMode) state.autoTimer=setTimeout(advance,2200); });
  if(s.text) state.log.push({name: isNarrator ? 'Voix extérieure' : (s.character||'Narrateur'), line:s.text, narrator:isNarrator});
}

function showChoices(s){
  dArrow.style.display='none';
  dChoice.innerHTML='';
  dChoice.classList.remove('hidden');
  s.choices.forEach(c=>{
    const b=document.createElement('button');
    b.className='choice-btn';
    b.textContent=c.label;
    b.onclick=()=>{
      dChoice.classList.add('hidden');
      go(c.next);
    };
    dChoice.appendChild(b);
  });
}

function showEnd(s){
  el('end-title').textContent = s.title;
  el('end-desc').textContent = s.desc;
  endScreen.classList.remove('hidden');
}

function typeText(text,onDone){
  clearTimeout(state.typeTimer);
  state.isTyping=true; dText.textContent=''; let i=0;
  const tick=()=>{
    if(i>=text.length){state.isTyping=false;if(onDone)onDone();return;}
    dText.textContent+=text[i++];
    state.typeTimer=setTimeout(tick,26);
  };
  tick();
}

function advance(){
  if(state.isTyping){
    const s=story[state.index];
    if(s?.type==='dialogue'){ clearTimeout(state.typeTimer); state.isTyping=false; dText.textContent=s.text; }
    return;
  }
  const next=state.index+1;
  if(next<story.length) go(next);
}

// ── Éditeur complet ──
let selectedSceneId = null;

function openEditor(){
  editorPanel.classList.remove('hidden');
  refreshSceneList();
  renderStoryTree();
  if(selectedSceneId){
    const scene = story.find(s => s.id === selectedSceneId);
    if(scene) fillEditorForm(scene);
    else selectedSceneId = story[0]?.id || null;
  } else if(story.length){
    selectScene(story[0].id);
  } else {
    resetEditorForm();
  }
  setEditorStatus('Modifie, supprime ou ajoute des scènes. Les changements sont sauvegardés.');
}

function closeEditor(){
  editorPanel.classList.add('hidden');
}

function syncEditorMode(){
  const isChoice = editorType.value === 'choice';
  const isEnd = editorType.value === 'end';
  editorChoiceBlock.classList.toggle('hidden', !isChoice);
  editorTextBlock.classList.toggle('hidden', isChoice || isEnd);
  editorCharacterRow.classList.toggle('hidden', isEnd);
  editorImageRow.classList.toggle('hidden', isEnd);
  editorBackgroundRow.classList.toggle('hidden', isEnd);
  editorEndBlock.classList.toggle('hidden', !isEnd);
  editorEndDescBlock.classList.toggle('hidden', !isEnd);
}

function setEditorStatus(message,isError=false){
  editorStatus.textContent = message;
  editorStatus.style.color = isError ? '#ff9fa6' : 'var(--muted)';
}

function generateSceneId(prefix='scene'){ 
  const base = `${prefix}_${Math.random().toString(36).slice(2,8)}`;
  return idMap[base] ? generateSceneId(prefix) : base;
}

function ensureUniqueId(candidate, ignoreId=null){
  const base = (candidate || '').trim() || generateSceneId();
  if(base === ignoreId) return base;
  return story.some(s => s.id === base && s.id !== ignoreId) ? generateSceneId() : base;
}

function updateReferences(oldId,newId){
  story.forEach(scene => {
    if(scene.type === 'choice' && Array.isArray(scene.choices)){
      scene.choices = scene.choices.map(choice => choice.next === oldId ? {...choice, next:newId} : choice);
    }
  });
}

function fillEditorForm(scene){
  editorType.value = scene.type || 'dialogue';
  editorId.value = scene.id || '';
  editorCharacter.value = scene.character || '';
  editorImage.value = scene.image || '';
  editorBackground.value = scene.background || '';
  editorText.value = scene.text || '';
  editorTitle.value = scene.title || '';
  editorDesc.value = scene.desc || '';
  editorChoices.value = Array.isArray(scene.choices) ? scene.choices.map(c => `${c.label} | ${c.next}`).join('\n') : '';
  syncEditorMode();
}

function resetEditorForm(){
  selectedSceneId = null;
  editorType.value = 'dialogue';
  editorId.value = '';
  editorCharacter.value = '';
  editorImage.value = '';
  editorBackground.value = '';
  editorText.value = '';
  editorTitle.value = '';
  editorDesc.value = '';
  editorChoices.value = '';
  syncEditorMode();
}

function refreshSceneList(){
  editorSceneList.innerHTML='';
  if(!story.length){
    editorSceneList.innerHTML='<div class="editor-empty">Aucune scène pour l’instant.</div>';
    return;
  }
  story.forEach((scene,index)=>{
    const btn = document.createElement('button');
    btn.type='button';
    btn.className='editor-scene-item' + (scene.id === selectedSceneId ? ' selected' : '');
    const typeLabel = scene.type === 'choice' ? 'Choix' : scene.type === 'end' ? 'Fin' : 'Dialogue';
    btn.innerHTML = `<strong>${index+1}. ${scene.id}</strong><span>${typeLabel} • ${scene.character || scene.title || 'Scène'}</span>`;
    btn.onclick = () => selectScene(scene.id);
    editorSceneList.appendChild(btn);
  });
}

function renderStoryTree(){
  editorTreeView.innerHTML='';
  if(!story.length){
    editorTreeView.innerHTML='<div class="tree-empty">Le scénario n’a pas encore de branches à afficher.</div>';
    return;
  }
  const list = document.createElement('div');
  list.className='tree-list';
  story.forEach((scene,index)=>{
    const node = document.createElement('div');
    node.className='tree-node';
    const typeLabel = scene.type === 'choice' ? 'Choix' : scene.type === 'end' ? 'Fin' : 'Dialogue';
    node.innerHTML = `<strong>${index+1}. ${scene.id}</strong><span>${typeLabel}</span>`;
    list.appendChild(node);
    if(scene.type === 'choice' && Array.isArray(scene.choices) && scene.choices.length){
      const branches = document.createElement('div');
      branches.className='tree-branches';
      scene.choices.forEach(choice => {
        const item = document.createElement('div');
        item.className='tree-branch';
        item.textContent = `↳ ${choice.label} → ${choice.next}`;
        branches.appendChild(item);
      });
      list.appendChild(branches);
    }
  });
  editorTreeView.appendChild(list);
}

function selectScene(id){
  const scene = story.find(s => s.id === id);
  if(!scene) return;
  selectedSceneId = scene.id;
  refreshSceneList();
  fillEditorForm(scene);
}

function buildSceneFromEditor(){
  const type = editorType.value;
  const id = ensureUniqueId(editorId.value, selectedSceneId);
  if(type === 'dialogue'){
    const text = editorText.value.trim();
    if(!text){ setEditorStatus('Écris un texte avant d’enregistrer cette scène.', true); return null; }
    return { id, type:'dialogue', character:editorCharacter.value.trim(), image:editorImage.value.trim(), background:editorBackground.value.trim(), text };
  }
  if(type === 'choice'){
    const rawChoices = editorChoices.value.split(/\n+/).map(l=>l.trim()).filter(Boolean);
    if(rawChoices.length === 0){ setEditorStatus('Ajoute au moins un choix.', true); return null; }
    const choices = rawChoices.map(line=>{
      const parts = line.split('|').map(p=>p.trim());
      const label = parts[0] || 'Choix';
      const next = parts[1] || generateSceneId('next');
      return { label, next };
    });
    return { id, type:'choice', choices };
  }
  const title = editorTitle.value.trim();
  const desc = editorDesc.value.trim();
  if(!title || !desc){ setEditorStatus('Ajoute un titre et une description pour cette fin.', true); return null; }
  return { id, type:'end', title, desc };
}

async function saveSceneFromEditor(mode='update'){
  const scene = buildSceneFromEditor();
  if(!scene) return;
  const existing = story.find(s => s.id === selectedSceneId);
  if(existing && mode === 'update'){
    const oldId = existing.id;
    const nextId = ensureUniqueId(scene.id, oldId);
    if(nextId !== oldId) updateReferences(oldId, nextId);
    const idx = story.findIndex(s => s.id === oldId);
    story[idx] = { ...scene, id: nextId };
    selectedSceneId = nextId;
    setEditorStatus(`Scène mise à jour : ${nextId}`);
  } else {
    const insertIndex = mode === 'end' ? story.length : Math.max(0, state.index + 1);
    const nextId = ensureUniqueId(scene.id);
    const newScene = { ...scene, id: nextId };
    story.splice(insertIndex, 0, newScene);
    selectedSceneId = nextId;
    state.index = insertIndex;
    setEditorStatus(`Nouvelle scène ajoutée : ${nextId}`);
  }
  rebuildIdMap();
  refreshSceneList();
  renderStoryTree();
  await saveStoryData();
  if(!el('game-screen').classList.contains('hidden')) {
    if(selectedSceneId) go(selectedSceneId);
  }
}

async function deleteSelectedScene(){
  if(!selectedSceneId){ setEditorStatus('Sélectionne une scène à supprimer.', true); return; }
  const targetId = selectedSceneId;
  if(!confirm('Supprimer cette scène et les références qui pointent vers elle ?')) return;
  story = story.filter(s => s.id !== targetId);
  story.forEach(scene => {
    if(scene.type === 'choice' && Array.isArray(scene.choices)){
      scene.choices = scene.choices.filter(choice => choice.next !== targetId);
    }
  });
  rebuildIdMap();
  selectedSceneId = story[0]?.id || null;
  refreshSceneList();
  renderStoryTree();
  if(selectedSceneId) fillEditorForm(story.find(s=>s.id===selectedSceneId));
  else resetEditorForm();
  await saveStoryData();
  setEditorStatus(`Scène supprimée : ${targetId}`);
  if(!el('game-screen').classList.contains('hidden')) go(Math.min(state.index, story.length - 1));
}

  go(0);
};

dBox.onclick=()=>{ if(!dChoice.classList.contains('hidden')) return; clearTimeout(state.autoTimer); advance(); };

document.onkeydown=e=>{
  if(!['Space','ArrowRight','Enter'].includes(e.code)) return;
  if(el('game-screen').classList.contains('hidden')) return;
  if(!dChoice.classList.contains('hidden')) return;
  clearTimeout(state.autoTimer); advance();
};

btnAuto.onclick=()=>{
  state.autoMode=!state.autoMode;
  btnAuto.classList.toggle('active',state.autoMode);
  if(!state.autoMode) clearTimeout(state.autoTimer);
  else if(!state.isTyping) state.autoTimer=setTimeout(advance,2200);
};

el('btn-skip').onclick=()=>{ clearTimeout(state.autoTimer); state.isTyping=false; advance(); };
el('btn-log').onclick=openLog;
el('btn-close-log').onclick=()=>logPanel.classList.add('hidden');
btnEditor.onclick=openEditor;
btnCloseEditor.onclick=closeEditor;
editorType.onchange=syncEditorMode;
syncEditorMode();
btnSaveScene.onclick=()=>saveSceneFromEditor('update');
btnNewScene.onclick=()=>{ resetEditorForm(); setEditorStatus('Formulaire vidé. Enregistre pour créer une nouvelle scène.'); };
btnAddScene.onclick=()=>saveSceneFromEditor('after');
btnAddSceneEnd.onclick=()=>saveSceneFromEditor('end');
btnDeleteScene.onclick=deleteSelectedScene;
btnSave.onclick=saveGame;
btnLoad.onclick=loadGame;

el('btn-end-restart').onclick=()=>{
  state.index=0;
  state.autoMode=false;
  state.log=[];
  endScreen.classList.add('hidden');
  el('title-screen').classList.remove('hidden');
};
</script>
</body>
</html>
